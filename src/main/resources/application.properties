spring.application.name=Java_qa_monitor

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/java_qa_monitor
spring.datasource.username=root
spring.datasource.password=005428

# ??SQL??
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
# ?????????? (? create_time ????????? createTime)
mybatis-plus.configuration.map-underscore-to-camel-case=true
# ????????
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0
mybatis-plus.global-config.db-config.logic-delete-field=isDeleted
# 指定 XML Mapper 文件扫描路径
mybatis-plus.mapper-locations=classpath*:cn/edu/swpu/java_qa_monitor/mapper/*.xml

# JWT
jwt.secret=swpu-java-qa-monitor-secret-key-2026-must-be-32-chars
jwt.expiration=86400000

# File upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
app.upload.base-path=D:/Workspace/JavaProject/Java_qa_monitor/uploads

# Async thread pool
spring.task.execution.pool.core-size=4
spring.task.execution.pool.max-size=8
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=scan-